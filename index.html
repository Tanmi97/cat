<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐱 Tanmi猫舍客服</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f2f2f2;
            max-width: 500px;
            margin: 0 auto;
        }
        .chat-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #fff;
        }
        .chat-header {
            background: #ffb6c1;
            color: #fff;
            padding: 14px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
        }
        .chat-box {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            background: #f9f9f9;
        }
        .message {
            margin-bottom: 10px;
            max-width: 75%;
            line-height: 1.4;
            word-break: break-word;
        }
        .user-message {
            background: #d3eafd;
            margin-left: auto;
            border-radius: 15px 15px 3px 15px;
            padding: 8px 12px;
        }
        .bot-message {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 15px 15px 15px 3px;
            padding: 8px 12px;
        }
        .input-area {
            display: flex;
            padding: 8px;
            border-top: 1px solid #eee;
        }
        #userInput {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
        }
        #sendBtn {
            margin-left: 8px;
            padding: 0 16px;
            border: none;
            background: #ffb6c1;
            color: #fff;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
        }
        #sendBtn:active {
            background: #f8a5b0;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">🐱 Tanmi猫舍智能客服</div>
        <div class="chat-box" id="chatBox">
            <div class="message bot-message">你好呀～我是Tanmi小卷，有什么想问我的吗？</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="请输入问题..." autocomplete="off">
            <button id="sendBtn">发送</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = isUser ? 'message user-message' : 'message bot-message';
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            addMessage(text, true);
            userInput.value = '';

            // 模拟回复（你原来前端就是这样）
            setTimeout(() => {
                addMessage('我是客服机器人，正在等你对接后端接口～', false);
            }, 600);
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
